<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>NeuroVis EEG — Brain Activity Dashboard</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "IBM Plex Sans", system-ui, sans-serif;
        overflow-x: hidden;
      }
      ::-webkit-scrollbar {
        width: 5px;
        height: 5px;
      }
      ::-webkit-scrollbar-thumb {
        background: #1a2540;
        border-radius: 3px;
      }
      button,
      select {
        font-family: inherit;
        cursor: pointer;
      }
      input[type="range"] {
        height: 4px;
        border-radius: 2px;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script>
      const h = React.createElement,
        { useState, useEffect, useRef, useCallback, Fragment } = React;
      const M = "'JetBrains Mono',monospace";
      window._nv_signal = true; // default: simulator on

      // ── Live Data Ingestion (from BrainFlow backend) ──
      // When _liveData is populated, bpow/bpowAbs read from it instead of simulator
      var _liveData = {}; // keyed by "channelId_bandIndex" → normalized 0-1 value
      var _liveRaw = {}; // keyed by "channelId_bandIndex" → absolute µV² value
      var _liveQuality = {}; // keyed by channelId → 0-1 quality
      var _liveActive = false;
      var _livePollTimer = null;

      // Band name → index mapping matching BANDS array
      var _bandNameToIdx = { delta: 0, theta: 1, alpha: 2, beta: 3, gamma: 4 };

      function _startLivePoll() {
        if (_livePollTimer) return;
        _liveActive = true;
        var _logCount = 0;
        _livePollTimer = setInterval(function () {
          fetch("/api/bands")
            .then(function (r) {
              return r.json();
            })
            .then(function (j) {
              if (!j.channels || j.channels.length === 0) return;
              if (_logCount < 3) {
                console.log(
                  "[NeuroVis] Live data:",
                  j.channels.length,
                  "channels,",
                  j.bands.join("/"),
                  ", sample values:",
                  j.values[0] &&
                    j.values[0].map(function (v) {
                      return v.toFixed(2);
                    }),
                );
                _logCount++;
              }
              // j.channels = ["CH1","CH2",...] or ["TP9","AF7",...]
              // j.bands = ["delta","theta","alpha","beta","gamma"]
              // j.values = [[ch1_delta,ch1_theta,...],[ch2_delta,...]]
              for (var ci = 0; ci < j.channels.length; ci++) {
                var chId = j.channels[ci];
                var chVals = j.values[ci] || [];
                var totalPow = 0;
                for (var k = 0; k < chVals.length; k++)
                  totalPow += Math.abs(chVals[k]);
                for (var bi = 0; bi < j.bands.length; bi++) {
                  var bIdx = _bandNameToIdx[j.bands[bi]];
                  if (bIdx === undefined) continue;
                  var key = chId + "_" + bIdx;
                  var raw = Math.abs(chVals[bi] || 0);
                  // Normalize to 0-1 for display (relative %)
                  _liveData[key] =
                    totalPow > 0 ? Math.min(1, raw / totalPow) : 0;
                  _liveRaw[key] = raw;
                }
                // Signal quality from data presence
                _liveQuality[chId] =
                  totalPow > 0.1 ? Math.min(1, 0.5 + totalPow * 0.005) : 0.1;
              }
            })
            .catch(function () {});
        }, 100); // 10 Hz polling
      }
      function _stopLivePoll() {
        _liveActive = false;
        if (_livePollTimer) {
          clearInterval(_livePollTimer);
          _livePollTimer = null;
        }
        _liveData = {};
        _liveRaw = {};
        _liveQuality = {};
      }

      // Auto-detect if backend is already streaming (started from /control page)
      (function _autoDetectStreaming() {
        fetch("/api/status")
          .then(function (r) {
            return r.json();
          })
          .then(function (j) {
            if (j.streaming) {
              console.log(
                "[NeuroVis Dashboard] Backend already streaming — starting live data feed",
              );
              window._nv_signal = true;
              _startLivePoll();
            }
          })
          .catch(function () {});
        // Keep checking every 3 seconds in case user starts streaming from control panel
        setInterval(function () {
          fetch("/api/status")
            .then(function (r) {
              return r.json();
            })
            .then(function (j) {
              if (j.streaming && !_liveActive) {
                console.log(
                  "[NeuroVis Dashboard] Streaming detected — starting live data feed",
                );
                window._nv_signal = true;
                _startLivePoll();
              } else if (!j.streaming && _liveActive) {
                console.log("[NeuroVis Dashboard] Streaming stopped");
                _stopLivePoll();
              }
            })
            .catch(function () {});
        }, 3000);
      })();

      // ── Device Profiles ──
      const DEVS = {
        muse_s: {
          name: "MUSE S (Athena)",
          brand: "Interaxon",
          ch: 4,
          hz: 256,
          addr: "MUSE-S-FDE6",
          icon: "\u{1F9D8}",
          color: "#7c3aed",
          eeg: [
            { id: "TP9", x: 14, y: 55 },
            { id: "AF7", x: 25, y: 20 },
            { id: "AF8", x: 75, y: 20 },
            { id: "TP10", x: 86, y: 55 },
          ],
          aux: {
            fnirs: {
              ch: ["fNIRS1", "fNIRS2", "fNIRS3"],
              d: "Near-infrared spectroscopy",
            },
            ppg: { ch: ["PPG1", "PPG2", "PPG3"], d: "Heart rate" },
            imu: {
              ch: ["AccX", "AccY", "AccZ", "GyroX", "GyroY", "GyroZ"],
              d: "6-axis motion",
            },
          },
        },
        muse_2: {
          name: "MUSE 2",
          brand: "Interaxon",
          ch: 4,
          hz: 256,
          addr: "MUSE-2-A31B",
          icon: "\u{1F9D8}",
          color: "#0891b2",
          eeg: [
            { id: "TP9", x: 14, y: 55 },
            { id: "AF7", x: 25, y: 20 },
            { id: "AF8", x: 75, y: 20 },
            { id: "TP10", x: 86, y: 55 },
          ],
          aux: {
            ppg: { ch: ["PPG1", "PPG2", "PPG3"], d: "Heart rate" },
            imu: {
              ch: ["AccX", "AccY", "AccZ", "GyroX", "GyroY", "GyroZ"],
              d: "6-axis motion",
            },
          },
        },
        ganglion: {
          name: "OpenBCI Ganglion",
          brand: "OpenBCI",
          ch: 4,
          hz: 200,
          addr: "Ganglion-8C4F",
          icon: "\u{1F52C}",
          color: "#059669",
          eeg: [
            { id: "Ch1", x: 35, y: 28 },
            { id: "Ch2", x: 65, y: 28 },
            { id: "Ch3", x: 35, y: 68 },
            { id: "Ch4", x: 65, y: 68 },
          ],
          aux: {},
        },
        ultracortex: {
          name: "OpenBCI Ultracortex",
          brand: "OpenBCI",
          ch: 16,
          hz: 250,
          addr: "UCortex-72E1",
          icon: "\u{1F9E0}",
          color: "#dc2626",
          eeg: [
            { id: "Fp1", x: 38, y: 12 },
            { id: "Fp2", x: 62, y: 12 },
            { id: "F7", x: 18, y: 28 },
            { id: "F3", x: 35, y: 28 },
            { id: "F4", x: 65, y: 28 },
            { id: "F8", x: 82, y: 28 },
            { id: "T3", x: 10, y: 50 },
            { id: "C3", x: 32, y: 48 },
            { id: "C4", x: 68, y: 48 },
            { id: "T4", x: 90, y: 50 },
            { id: "P3", x: 35, y: 68 },
            { id: "P4", x: 65, y: 68 },
            { id: "T5", x: 18, y: 70 },
            { id: "T6", x: 82, y: 70 },
            { id: "O1", x: 38, y: 86 },
            { id: "O2", x: 62, y: 86 },
          ],
          aux: {},
        },
      };

      const BANDS = [
        { n: "Delta", r: "0.5-4", c: "#6366f1", d: "#a5b4fc", f: 2, a: 40 },
        { n: "Theta", r: "4-8", c: "#0891b2", d: "#22d3ee", f: 6, a: 35 },
        { n: "Alpha", r: "8-13", c: "#059669", d: "#34d399", f: 10, a: 50 },
        { n: "Beta", r: "13-30", c: "#d97706", d: "#fbbf24", f: 20, a: 25 },
        { n: "Gamma", r: "30-100", c: "#dc2626", d: "#f87171", f: 45, a: 12 },
      ];

      const SKINS = [
        { brain: "#fde8d0", skull: "#f5d6b8", sulci: "#c9868b" },
        { brain: "#e8c9a0", skull: "#d4b08c", sulci: "#b07070" },
        { brain: "#c8a882", skull: "#b8956e", sulci: "#985858" },
        { brain: "#a08060", skull: "#8c6e50", sulci: "#804848" },
        { brain: "#785838", skull: "#6a4c30", sulci: "#683838" },
      ];

      const PROCS = [
        { id: "none", n: "Bypass", cat: "Filter" },
        { id: "lp", n: "Low Pass", cat: "Filter" },
        { id: "hp", n: "High Pass", cat: "Filter" },
        { id: "notch", n: "Notch 50/60", cat: "Filter" },
        { id: "bp", n: "Band Pass", cat: "Filter" },
        { id: "dc", n: "DC Block", cat: "Filter" },
        { id: "deltafilt", n: "Delta Suppress", cat: "Filter" },
        { id: "ema", n: "EMA", cat: "Smooth" },
        { id: "savgol", n: "Savitzky-Golay", cat: "Smooth" },
        { id: "median", n: "Median", cat: "Smooth" },
        { id: "kalman", n: "Kalman", cat: "Smooth" },
        { id: "rms", n: "RMS Env", cat: "Smooth" },
        { id: "gauss", n: "Gaussian", cat: "Smooth" },
        { id: "gate", n: "Noise Gate", cat: "Gate" },
        { id: "thresh", n: "Threshold", cat: "Gate" },
        { id: "hyst", n: "Hysteresis", cat: "Gate" },
        { id: "peak", n: "Peak Detect", cat: "Gate" },
        { id: "zerox", n: "Zero-Cross", cat: "Gate" },
        { id: "artifact", n: "Artifact Rej", cat: "Gate" },
        { id: "envf", n: "Env Follow", cat: "Shape" },
        { id: "slew", n: "Slew Limit", cat: "Shape" },
        { id: "clip", n: "Soft Clip", cat: "Shape" },
        { id: "rect", n: "Rectifier", cat: "Shape" },
      ];

      const TH = {
        dark: {
          bg: "#060a14",
          c1: "#0c1222",
          c2: "#0a0f1c",
          bd: "#1a2540",
          tx: "#d8e2f0",
          t2: "#7e92b0",
          t3: "#4a5e7a",
          ac: "#6366f1",
          sg: "#070d1a",
          gd: "#22c55e",
          wr: "#eab308",
          rd: "#ef4444",
        },
        light: {
          bg: "#edf1f7",
          c1: "#fff",
          c2: "#f4f6fa",
          bd: "#d4dae6",
          tx: "#1a2540",
          t2: "#4a5e7a",
          t3: "#8899b0",
          ac: "#4f46e5",
          sg: "#f7f9fd",
          gd: "#16a34a",
          wr: "#ca8a04",
          rd: "#dc2626",
        },
      };

      // ── Signal Engine ──
      const _s = {};
      function gs(k) {
        if (!_s[k]) _s[k] = { p: 0, b: [], kP: 1, kX: 0, env: 0, hy: 0, pv: 0 };
        return _s[k];
      }
      function rawEEG(t, id, bi) {
        const s = (id.charCodeAt(0) || 0) * 137 + (id.charCodeAt(1) || 0) * 31;
        const b = BANDS[bi],
          f = b.f,
          a = b.a,
          p = (s % 100) / 15;
        return (
          a *
            Math.sin(2 * Math.PI * f * t + p) *
            (0.7 + 0.3 * Math.sin(t * 0.5 + s)) +
          (a / 3) * Math.sin(2 * Math.PI * f * 1.3 * t + p * 2) +
          (Math.random() - 0.5) * a * 0.3
        );
      }
      function proc(v, pid, k, fp) {
        const f = gs(k);
        if (pid === "none") return v;
        if (pid === "lp") {
          const a = fp.a || 0.15;
          f.p = f.p * a + v * (1 - a);
          return f.p;
        }
        if (pid === "hp") {
          const a = fp.a || 0.95;
          const o = a * (f.p + v - (f.b[0] || v));
          f.b[0] = v;
          f.p = o;
          return o;
        }
        if (pid === "notch") {
          f.b.push(v);
          if (f.b.length > 3) f.b.shift();
          if (f.b.length < 3) return v;
          const w = (2 * Math.PI * (fp.nf || 60)) / 256;
          const r = 0.985;
          return (
            f.b[2] -
            2 * Math.cos(w) * f.b[1] +
            f.b[0] +
            2 * r * Math.cos(w) * f.p -
            r * r * f.b[2]
          );
        }
        if (pid === "bp")
          return proc(proc(v, "lp", k + "l", { a: 0.3 }), "hp", k + "h", {
            a: 0.9,
          });
        if (pid === "dc") {
          const r = 0.995;
          const o = v - f.p + r * (f.b[0] || 0);
          f.p = v;
          f.b[0] = o;
          return o;
        }
        if (pid === "deltafilt") {
          const a = 0.92;
          const o = a * (f.p + v - (f.b[0] || v));
          f.b[0] = v;
          f.p = o;
          return o;
        }
        if (pid === "ema") {
          const a = fp.a || 0.2;
          f.p = a * v + (1 - a) * f.p;
          return f.p;
        }
        if (pid === "savgol") {
          f.b.push(v);
          if (f.b.length > 7) f.b.shift();
          if (f.b.length < 7) return v;
          const c = [-2, 3, 6, 7, 6, 3, -2];
          let s = 0,
            w = 0;
          f.b.forEach(function (x, i) {
            s += x * c[i];
            w += c[i];
          });
          return s / w;
        }
        if (pid === "median") {
          f.b.push(v);
          if (f.b.length > 5) f.b.shift();
          return f.b.slice().sort(function (a, b) {
            return a - b;
          })[Math.floor(f.b.length / 2)];
        }
        if (pid === "kalman") {
          f.kP += 0.1;
          var K = f.kP / (f.kP + 0.5);
          f.kX += K * (v - f.kX);
          f.kP *= 1 - K;
          return f.kX;
        }
        if (pid === "rms") {
          f.b.push(v * v);
          if (f.b.length > 16) f.b.shift();
          return Math.sqrt(
            f.b.reduce(function (a, b) {
              return a + b;
            }, 0) / f.b.length,
          );
        }
        if (pid === "gauss") {
          f.b.push(v);
          if (f.b.length > 7) f.b.shift();
          if (f.b.length < 3) return v;
          let s = 0,
            w = 0;
          f.b.forEach(function (x, i) {
            const g = Math.exp(-Math.pow(i - f.b.length / 2, 2) / 2);
            s += x * g;
            w += g;
          });
          return s / w;
        }
        if (pid === "gate") return Math.abs(v) < (fp.gt || 20) ? 0 : v;
        if (pid === "thresh") return Math.abs(v) > (fp.th || 30) ? 1 : 0;
        if (pid === "hyst") {
          if (Math.abs(v) > (fp.hi || 40)) f.hy = 1;
          if (Math.abs(v) < (fp.lo || 20)) f.hy = 0;
          return f.hy;
        }
        if (pid === "peak") {
          const p2 = f.b[0] || 0;
          f.b[0] = f.pv;
          f.pv = v;
          return f.pv > p2 && f.pv > v && f.pv > 10 ? f.pv : 0;
        }
        if (pid === "zerox") {
          const p = f.pv;
          f.pv = v;
          return (p >= 0 && v < 0) || (p < 0 && v >= 0) ? 1 : 0;
        }
        if (pid === "artifact") {
          if (Math.abs(v) > 80) {
            f.hy = 8;
            return 0;
          }
          if (f.hy > 0) {
            f.hy--;
            return 0;
          }
          return v;
        }
        if (pid === "envf") {
          const abs = Math.abs(v);
          f.env =
            abs > f.env
              ? 0.01 * abs + 0.99 * f.env
              : 0.001 * abs + 0.999 * f.env;
          return f.env;
        }
        if (pid === "slew") {
          const d = Math.max(-5, Math.min(5, v - f.p));
          f.p += d;
          return f.p;
        }
        if (pid === "clip") return Math.tanh(v * 0.05) / 0.05;
        if (pid === "rect") return Math.abs(v);
        return v;
      }
      function eeg(t, id, bi, pid, fp) {
        if (!window._nv_signal) return 0;
        if (_liveActive && _liveRaw[id + "_" + bi] !== undefined) {
          return (
            _liveRaw[id + "_" + bi] * 0.5 * (0.8 + 0.2 * Math.sin(t * 2 + bi))
          );
        }
        return proc(rawEEG(t, id, bi), pid, id + "_" + bi, fp);
      }
      // bpow returns normalized 0-1 for displays
      function bpow(t, id, bi, pid, fp) {
        if (!window._nv_signal) return 0;
        if (_liveActive && _liveData[id + "_" + bi] !== undefined)
          return _liveData[id + "_" + bi];
        return Math.min(1, Math.abs(eeg(t, id, bi, pid, fp)) / 60);
      }
      // bpowAbs returns Mind Monitor-compatible absolute power: log10(µV²/Hz), range ~0.0-3.0
      function bpowAbs(t, id, bi, pid, fp) {
        if (!window._nv_signal) return 0;
        if (_liveActive && _liveRaw[id + "_" + bi] !== undefined) {
          return Math.max(0, Math.log10(_liveRaw[id + "_" + bi] + 1) * 1.2);
        }
        var raw = Math.abs(eeg(t, id, bi, pid, fp));
        return Math.max(0, Math.log10(raw * raw + 1) * 1.2);
      }
      // bpowScaled returns value * user scale factor for OSC output
      var _oscScale = 1.0;
      function bpowOSC(t, id, bi, pid, fp) {
        return bpowAbs(t, id, bi, pid, fp) * _oscScale;
      }
      // Smoothed quality — uses live quality when available
      var _qualSmooth = {};
      function qual(id, t) {
        if (!window._nv_signal) return 0;
        if (_liveActive && _liveQuality[id] !== undefined) {
          if (!_qualSmooth[id]) _qualSmooth[id] = _liveQuality[id];
          _qualSmooth[id] = _qualSmooth[id] * 0.95 + _liveQuality[id] * 0.05;
          return _qualSmooth[id];
        }
        var s = (id.charCodeAt(0) || 0) * 7 + (id.charCodeAt(1) || 0) * 13;
        var raw = Math.max(
          0,
          Math.min(
            1,
            0.7 +
              0.25 * Math.sin(t * 0.008 + s * 0.3) +
              0.05 * Math.sin(t * 0.04 + s * 0.7),
          ),
        );
        if (!_qualSmooth[id]) _qualSmooth[id] = raw;
        _qualSmooth[id] = _qualSmooth[id] * 0.97 + raw * 0.03;
        return _qualSmooth[id];
      }
      // Smoothed band power for meters (avoids jumpiness in bar displays)
      var _meterSmooth = {};
      function bpowSmooth(t, id, bi, pid, fp) {
        var k = id + "_" + bi;
        var raw = bpow(t, id, bi, pid, fp);
        if (!_meterSmooth[k]) _meterSmooth[k] = raw;
        _meterSmooth[k] = _meterSmooth[k] * 0.92 + raw * 0.08;
        return _meterSmooth[k];
      }
      function qc(q, th) {
        return q > 0.8 ? th.gd : q > 0.6 ? th.wr : th.rd;
      }
      function simAux(t, ch) {
        if (!window._nv_signal)
          return ch.indexOf("PPG") === 0
            ? 0
            : ch.indexOf("Acc") === 0 && ch[3] === "Z"
              ? 9.8
              : 0;
        if (ch.indexOf("fN") === 0)
          return (
            0.3 +
            0.2 * Math.sin(t * 0.08 + ch.charCodeAt(5) * 17) +
            Math.random() * 0.02
          );
        if (ch.indexOf("PPG") === 0)
          return (
            72 +
            8 * Math.sin(t * 0.05) +
            3 * Math.sin(t * 1.2) +
            Math.random() * 2
          );
        if (ch.indexOf("Acc") === 0)
          return (
            (ch[3] === "Z" ? 9.8 : 0) +
            0.15 * Math.sin(t * 0.3 + ch.charCodeAt(3) * 5) +
            Math.random() * 0.08
          );
        if (ch.indexOf("Gyro") === 0)
          return (
            2 * Math.sin(t * 0.2 + ch.charCodeAt(4) * 3) + Math.random() * 0.5
          );
        return 0;
      }

      // ── UI Helpers ──
      function Card(p) {
        return h(
          "div",
          {
            style: {
              background: p.t.c1,
              borderRadius: 10,
              border: "1px solid " + p.t.bd,
              boxShadow: "0 4px 24px rgba(0,0,0,.3)",
              overflow: "hidden",
            },
          },
          p.title &&
            h(
              "div",
              {
                style: {
                  padding: "8px 12px",
                  borderBottom: "1px solid " + p.t.bd,
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "center",
                  gap: 6,
                  flexWrap: "wrap",
                },
              },
              h("span", { style: { fontSize: 11, fontWeight: 700 } }, p.title),
              p.right,
            ),
          h("div", { style: { padding: 12 } }, p.children),
        );
      }

      function Pill(p) {
        return h(
          "button",
          {
            onClick: p.fn,
            style: {
              padding: "2px 8px",
              borderRadius: 12,
              border: "1px solid " + (p.on ? p.c : p.t.bd),
              background: p.on ? p.c + "20" : "transparent",
              color: p.on ? p.c : p.t.t3,
              fontSize: 8,
              fontWeight: 700,
              fontFamily: M,
              whiteSpace: "nowrap",
            },
          },
          p.label,
        );

      // ── Canvas Displays ──
      function PowerTL(p) {
        var ref = useRef(null),
          hist = useRef({});
        var th = p.t,
          d = DEVS[p.dev],
          isDk = th === TH.dark;
        var els = d.eeg.filter(function (e) {
          return p.chs.indexOf(e.id) >= 0;
        });
        useEffect(
          function () {
            var c = ref.current;
            if (!c) return;
            var ctx = c.getContext("2d"),
              W = c.width,
              H = c.height;
            ctx.clearRect(0, 0, W, H);
            var mW = 120,
              tlX = mW + 14,
              tlW = W - tlX - 14,
              rH = H / Math.max(els.length, 1);
            els.forEach(function (el, ei) {
              var yT = ei * rH,
                yM = yT + rH / 2;
              if (ei > 0) {
                ctx.strokeStyle = th.bd;
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.moveTo(0, yT);
                ctx.lineTo(W, yT);
                ctx.stroke();
              }
              ctx.fillStyle = th.t2;
              ctx.font = "bold 9px " + M;
              ctx.fillText(el.id, 4, yM + 3);
              p.bands.forEach(function (bn, bi2) {
                var bIdx = BANDS.findIndex(function (b) {
                  return b.n === bn;
                });
                if (bIdx < 0) return;
                var b = BANDS[bIdx],
                  col = isDk ? b.d : b.c,
                  pw = bpow(p.time, el.id, bIdx, p.pid, p.fp);
                var bH = Math.max(2, (rH - 4) / p.bands.length - 1),
                  by = yT + 2 + bi2 * (bH + 1);
                ctx.fillStyle = th.bd + "60";
                ctx.fillRect(30, by, mW - 36, bH);
                ctx.fillStyle = col;
                ctx.globalAlpha = 0.8;
                ctx.fillRect(30, by, pw * (mW - 36), bH);
                ctx.globalAlpha = 1;
                if (!hist.current[el.id]) hist.current[el.id] = {};
                if (!hist.current[el.id][bn]) hist.current[el.id][bn] = [];
                hist.current[el.id][bn].push(
                  eeg(p.time, el.id, bIdx, p.pid, p.fp),
                );
                if (hist.current[el.id][bn].length > 200)
                  hist.current[el.id][bn].shift();
                var data = hist.current[el.id][bn];
                ctx.strokeStyle = col;
                ctx.lineWidth = 1;
                ctx.globalAlpha = 0.7;
                ctx.beginPath();
                data.forEach(function (v, i) {
                  var x = tlX + (i / 199) * tlW,
                    y = yM - (v / 100) * (rH * 0.35);
                  i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                });
                ctx.stroke();
                ctx.globalAlpha = 1;
              });
              var q = qual(el.id, p.time);
              ctx.fillStyle = qc(q, th);
              ctx.beginPath();
              ctx.arc(W - 6, yM, 3, 0, Math.PI * 2);
              ctx.fill();
            });
          },
          [Math.floor(p.time * 6)],
        );
        var ch = Math.max(250, els.length * 50);
        return h("canvas", {
          ref: ref,
          width: 1000,
          height: ch,
          style: {
            width: "100%",
            height: Math.max(200, els.length * 40),
            borderRadius: 8,
            background: th.sg,
          },
        });
      }

      function TopoSVG(p) {
        var th = p.t,
          d = DEVS[p.dev],
          b = BANDS[p.bi],
          isDk = th === TH.dark,
          col = isDk ? b.d : b.c,
          skin = p.skin;
        var els = d.eeg;
        var defs = els.map(function (el) {
          var pw = bpow(p.time, el.id, p.bi, p.pid, p.fp);
          return h(
            "radialGradient",
            { key: el.id, id: "t" + el.id },
            h("stop", { offset: "0%", stopColor: col, stopOpacity: pw * 0.85 }),
            h("stop", {
              offset: "40%",
              stopColor: col,
              stopOpacity: pw * 0.35,
            }),
            h("stop", { offset: "100%", stopColor: col, stopOpacity: 0 }),
          );
        });
        var glowR = d.ch <= 4 ? 60 : 38;
        var glows = els.map(function (el) {
          var cx = (el.x / 100) * 300 + 20,
            cy = (el.y / 100) * 340 + 20;
          return h("circle", {
            key: "g" + el.id,
            cx: cx,
            cy: cy,
            r: glowR,
            fill: "url(#t" + el.id + ")",
          });

      // ── 3D FFT Waterfall ──
      function Waterfall(p) {
        var d = DEVS[p.dev],
          hist = useRef([]),
          isDk = p.t === TH.dark,
          th = p.t;
        var ref = useRef(null);
        useEffect(
          function () {
            // Build a row of FFT bins (60 bins covering 0-60 Hz) for the first electrode
            var elId = d.eeg[0].id;
            var nBins = 60;
            var row = [];
            for (var f = 0; f < nBins; f++) {
              var freq = (f / nBins) * 60;
              var bIdx =
                freq < 4 ? 0 : freq < 8 ? 1 : freq < 13 ? 2 : freq < 30 ? 3 : 4;
              row.push(
                Math.abs(eeg(p.time + f * 0.002, elId, bIdx, p.pid, p.fp)) / 50,
              );
            }
            hist.current.push(row);
            if (hist.current.length > 90) hist.current.shift();
            var c = ref.current;
            if (!c) return;
            var ctx = c.getContext("2d"),
              W = c.width,
              H = c.height;
            ctx.clearRect(0, 0, W, H);
            var oX = 60,
              oY = 35,
              nRows = hist.current.length;
            var binW = (W - 140) / nBins;
            // Draw back to front
            for (var r = 0; r < nRows; r++) {
              var rd = hist.current[r];
              var yBase = H - oY - r * 3.8;
              var xShift = r * 1.8;
              var alpha = 0.08 + (r / nRows) * 0.92;
              // Filled polygon
              ctx.beginPath();
              ctx.moveTo(oX + xShift, yBase);
              for (var b2 = 0; b2 < nBins; b2++) {
                var x = oX + xShift + b2 * binW;
                var amp = Math.min(rd[b2], 2) * 120;
                ctx.lineTo(x, yBase - amp);
              }
              ctx.lineTo(oX + xShift + (nBins - 1) * binW, yBase);
              ctx.closePath();
              // Color by predominant band at front
              var bIdx2 = Math.floor(nBins / 2);
              var freq2 = (bIdx2 / nBins) * 60;
              var bandI =
                freq2 < 4
                  ? 0
                  : freq2 < 8
                    ? 1
                    : freq2 < 13
                      ? 2
                      : freq2 < 30
                        ? 3
                        : 4;
              var bc = isDk ? BANDS[p.bi].d : BANDS[p.bi].c;
              ctx.fillStyle =
                bc +
                Math.floor(alpha * 18)
                  .toString(16)
                  .padStart(2, "0");
              ctx.fill();
              // Line with color segments
              for (var b3 = 1; b3 < nBins; b3++) {
                var freq3 = (b3 / nBins) * 60;
                var bi3 =
                  freq3 < 4
                    ? 0
                    : freq3 < 8
                      ? 1
                      : freq3 < 13
                        ? 2
                        : freq3 < 30
                          ? 3
                          : 4;
                var segCol = isDk ? BANDS[bi3].d : BANDS[bi3].c;
                ctx.strokeStyle = segCol;
                ctx.globalAlpha = alpha;
                ctx.lineWidth = 1.2;
                ctx.beginPath();
                ctx.moveTo(
                  oX + xShift + (b3 - 1) * binW,
                  yBase - Math.min(rd[b3 - 1], 2) * 120,
                );
                ctx.lineTo(
                  oX + xShift + b3 * binW,
                  yBase - Math.min(rd[b3], 2) * 120,
                );
                ctx.stroke();
              }
              ctx.globalAlpha = 1;
            }
            // Frequency axis labels
            ctx.fillStyle = th.t3;
            ctx.font = "9px " + M;
            [0, 4, 8, 13, 30, 60].forEach(function (f2) {
              var x = oX + (f2 / 60) * (W - 140);
              ctx.fillText(f2 + "Hz", x - 6, H - 4);
            });
            // Band labels at top
            ctx.font = "bold 8px " + M;
            [
              { n: "Delta", lo: 0, hi: 4, i: 0 },
              { n: "Theta", lo: 4, hi: 8, i: 1 },
              { n: "Alpha", lo: 8, hi: 13, i: 2 },
              { n: "Beta", lo: 13, hi: 30, i: 3 },
              { n: "Gamma", lo: 30, hi: 60, i: 4 },
            ].forEach(function (br) {
              var x1 = oX + (br.lo / 60) * (W - 140),
                x2 = oX + (br.hi / 60) * (W - 140);
              var bc2 = isDk ? BANDS[br.i].d : BANDS[br.i].c;
              ctx.fillStyle = bc2 + "30";
              ctx.fillRect(x1, 8, x2 - x1, 12);
              ctx.fillStyle = bc2;
              ctx.fillText(br.n, x1 + 2, 17);
            });
            ctx.fillStyle = th.t3;
            ctx.font = "10px " + M;
            ctx.fillText("\u2190 Time (rows)", W - 100, 20);
            ctx.fillText("Amplitude \u2191", 5, 20);
          },
          [Math.floor(p.time * 5)],
        );
        return h("canvas", {
          ref: ref,
          width: 1300,
          height: 580,
          style: {
            width: "100%",
            height: 440,
            borderRadius: 8,
            background: th.sg,
          },
        });
      }

      // ── Full Brain (4-view EPOC style) ──
      function FullBrain(p) {
        var d = DEVS[p.dev],
          b = BANDS[p.bi],
          isDk = p.t === TH.dark,
          col = isDk ? b.d : b.c,
          skin = p.skin,
          th = p.t;
        var glowR = d.ch <= 4 ? 55 : 38;
        function proj(el, v) {
          switch (v) {
            case "top":
              return { x: el.x * 2.8 + 30, y: el.y * 2.6 + 10 };
            case "left":
              return { x: (100 - el.y) * 2.6 + 15, y: 45 + (50 - el.x) * 1.8 };
            case "right":
              return { x: el.y * 2.6 + 15, y: 45 + (el.x - 50) * 1.8 };
            default:
              return { x: (100 - el.x) * 2.6 + 15, y: (100 - el.y) * 2.2 + 15 };
          }
        }
        return h(
          "div",
          null,
          h(
            "div",
            { style: { fontSize: 8, color: th.t3, marginBottom: 6 } },
            d.name +
              " \u2014 showing " +
              b.n +
              " band power across " +
              d.ch +
              " electrodes. Brighter = higher power.",

          h(
            "div",
            {
              style: {
                display: "grid",
                gridTemplateColumns: "1fr 1fr",
                gap: 8,

            ["top", "left", "right", "back"].map(function (v) {
              var fE = d.eeg.filter(function (e) {
                return v === "top"
                  ? true
                  : v === "left"
                    ? e.x <= 55
                    : v === "right"
                      ? e.x >= 45
                      : e.y >= 50;
              });
              // Build radial gradient defs for each electrode in this view
              var gradDefs = fE.map(function (el) {

                  h("stop", {
                    offset: "0%",
                    stopColor: col,
                    stopOpacity: Math.max(0.35, pw * 0.9),
                  }),
                  h("stop", {
                    offset: "45%",
                    stopColor: col,
                    stopOpacity: Math.max(0.15, pw * 0.5),
                  }),
                  h("stop", { offset: "100%", stopColor: col, stopOpacity: 0 }),
                );
              });
              return h(
                "div",
                {
                  key: v,
                  style: {
                    background: th.sg,
                    borderRadius: 8,
                    border: "1px solid " + th.bd,
                    padding: 4,
                  },
                },
                h(
                  "div",
                  {
                    style: {
                      fontSize: 9,
                      fontWeight: 700,
                      color: th.t2,
                      textTransform: "capitalize",
                      padding: "2px 6px",
                    },
                  },
                  v,
                ),
                h(
                  "svg",
                  {
                    viewBox: "0 0 320 260",
                    style: { width: "100%", height: 200 },
                  },
                  h("defs", null, gradDefs),
                  h("ellipse", {
                    cx: 160,
                    cy: 130,
                    rx: 125,
                    ry: 120,
                    fill: skin.brain,
                    stroke: skin.sulci,
                    strokeWidth: 1.5,
                  }),
                  v === "top" &&
                    h("line", {
                      x1: 160,
                      y1: 8,
                      x2: 160,
                      y2: 252,
                      stroke: skin.sulci,
                      strokeWidth: 1.5,
                      opacity: 0.4,
                    }),
                  v === "top" &&
                    h(
                      "text",
                      {
                        x: 160,
                        y: 8,
                        textAnchor: "middle",
                        fontSize: 7,
                        fill: th.t3,
                      },
                      "Front",
                    ),
                  v === "top" &&
                    h(
                      "text",
                      {
                        x: 160,
                        y: 258,
                        textAnchor: "middle",
                        fontSize: 7,
                        fill: th.t3,
                      },
                      "Back",
                    ),
                  // Glow layer (radial gradient halos — rendered first, behind dots)
                  fE.map(function (el) {
                    var pt = proj(el, v),
                      pw = bpow(p.time, el.id, p.bi, p.pid, p.fp);
                    return h("circle", {
                      key: "glow_" + el.id,
                      cx: pt.x,
                      cy: pt.y,
                      r: glowR + pw * 30,
                      fill: "url(#fb_" + v + "_" + el.id + ")",
                    });
                  }),
                  // Electrode dots + labels (on top of glows)
                  fE.map(function (el) {
                    var pt = proj(el, v),
                      pw = bpow(p.time, el.id, p.bi, p.pid, p.fp);
                    return h(
                      "g",
                      { key: el.id },
                      h("circle", {
                        cx: pt.x,
                        cy: pt.y,
                        r: 7 + pw * 5,
                        fill: col,
                        opacity: 0.75 + pw * 0.25,
                        stroke: th.c1,
                        strokeWidth: 1.2,
                      }),
                      h(
                        "text",
                        {
                          x: pt.x,
                          y: pt.y - 12,

                          fontSize: 8,
                          fill: th.tx,
                          fontWeight: 600,
                          fontFamily: M,
                        },
                        el.id,
                      ),
                    );
                  }),

      // ── Phase Display (2D polar, smoothed) ──
      function PhaseView(p) {
        var d = DEVS[p.dev],
          b = BANDS[p.bi],
          isDk = p.t === TH.dark,
          col = isDk ? b.d : b.c,
          th = p.t;
        var ref = useRef(null),
          trails = useRef({});
        useEffect(
          function () {
            var c = ref.current;
            if (!c) return;
            var ctx = c.getContext("2d"),
              W = c.width,
              H = c.height;
            ctx.clearRect(0, 0, W, H);
            var cx = W / 2,
              cy = H / 2,
              r = Math.min(cx, cy) - 30;
            // Grid circles
            ctx.strokeStyle = th.bd;
            ctx.lineWidth = 0.5;
            [1, 0.75, 0.5, 0.25].forEach(function (s) {
              ctx.beginPath();
              ctx.arc(cx, cy, r * s, 0, Math.PI * 2);
              ctx.stroke();
            });
            // Cross hairs
            ctx.beginPath();
            ctx.moveTo(cx - r, cy);
            ctx.lineTo(cx + r, cy);
            ctx.moveTo(cx, cy - r);
            ctx.lineTo(cx, cy + r);
            ctx.stroke();
            // Degree labels
            ctx.fillStyle = th.t3;
            ctx.font = "9px " + M;
            [0, 90, 180, 270].forEach(function (deg) {
              var rad = (deg * Math.PI) / 180;
              ctx.fillText(
                deg + "\u00B0",
                cx + Math.cos(rad) * (r + 14) - 8,
                cy + Math.sin(rad) * (r + 14) + 3,
              );
            });
            // Electrode phase vectors with trail
            d.eeg.forEach(function (el) {
              var phase =
                (eeg(p.time, el.id, p.bi, p.pid, p.fp) / 80) * Math.PI;
              var mg = Math.min(bpow(p.time, el.id, p.bi, p.pid, p.fp), 1);
              var ex = cx + Math.cos(phase) * r * mg,
                ey = cy + Math.sin(phase) * r * mg;
              // Trail
              if (!trails.current[el.id]) trails.current[el.id] = [];
              trails.current[el.id].push({ x: ex, y: ey });
              if (trails.current[el.id].length > 12)
                trails.current[el.id].shift();
              ctx.strokeStyle = col + "30";
              ctx.lineWidth = 1;
              ctx.beginPath();
              trails.current[el.id].forEach(function (pt, i) {
                i === 0 ? ctx.moveTo(pt.x, pt.y) : ctx.lineTo(pt.x, pt.y);
              });
              ctx.stroke();
              // Vector line
              ctx.strokeStyle = col;
              ctx.lineWidth = 2;
              ctx.globalAlpha = 0.5 + mg * 0.5;
              ctx.beginPath();
              ctx.moveTo(cx, cy);
              ctx.lineTo(ex, ey);
              ctx.stroke();
              ctx.globalAlpha = 1;
              // Dot
              ctx.fillStyle = col;
              ctx.beginPath();
              ctx.arc(ex, ey, 3 + mg * 3, 0, Math.PI * 2);
              ctx.fill();
              ctx.fillStyle = th.tx;
              ctx.font = "bold 8px " + M;
              ctx.fillText(el.id, ex + 6, ey - 4);
            });
          },
          [Math.floor(p.time * 4)],
        );
        return h("canvas", {
          ref: ref,
          width: 400,
          height: 400,
          style: {
            width: "100%",
            maxWidth: 360,
            height: 300,
            borderRadius: 8,
            background: th.sg,
            margin: "0 auto",
            display: "block",
          },
        });
      }

      // ── FFT Spectrum + Power Bands ──
      function FFTView(p) {
        var th = p.t,
          d = DEVS[p.dev],
          isDk = th === TH.dark;
        var ref = useRef(null),
          hist = useRef({});
        useEffect(
          function () {
            var c = ref.current;
            if (!c) return;
            var ctx = c.getContext("2d"),
              W = c.width,
              H = c.height;
            ctx.clearRect(0, 0, W, H);
            var specW = W * 0.65,
              barX = specW + 30,
              barW = W - barX - 10;
            var elId = d.eeg[0].id;
            // ── Left: FFT spectrum curve ──
            // Grid
            ctx.strokeStyle = th.bd + "60";
            ctx.lineWidth = 0.5;
            for (var gy = 0; gy < 5; gy++) {
              var yy = 20 + gy * ((H - 40) / 4);
              ctx.beginPath();
              ctx.moveTo(40, yy);
              ctx.lineTo(specW, yy);
              ctx.stroke();
            }
            // Frequency axis
            ctx.fillStyle = th.t3;
            ctx.font = "8px " + M;
            [0, 10, 20, 30, 40, 50, 60].forEach(function (f) {
              var xx = 40 + (f / 60) * (specW - 50);
              ctx.fillText(f + "", xx - 6, H - 4);
            });
            ctx.fillText("Hz", specW - 10, H - 4);
            // Band region shading
            var bandRanges = [
              { lo: 0.5, hi: 4, bi: 0 },
              { lo: 4, hi: 8, bi: 1 },
              { lo: 8, hi: 13, bi: 2 },
              { lo: 13, hi: 30, bi: 3 },
              { lo: 30, hi: 60, bi: 4 },
            ];
            bandRanges.forEach(function (br) {
              var x1 = 40 + (br.lo / 60) * (specW - 50),
                x2 = 40 + (br.hi / 60) * (specW - 50);
              var bc = isDk ? BANDS[br.bi].d : BANDS[br.bi].c;
              ctx.fillStyle = bc + "12";
              ctx.fillRect(x1, 15, x2 - x1, H - 40);
              ctx.fillStyle = bc;
              ctx.font = "bold 7px " + M;
              ctx.fillText(BANDS[br.bi].n, x1 + 2, 12);
            });
            // Spectrum line per visible electrode
            d.eeg.slice(0, 4).forEach(function (el, ei) {
              var bc = isDk ? BANDS[ei % 5].d : BANDS[ei % 5].c;
              ctx.strokeStyle = bc;
              ctx.lineWidth = 1.5;
              ctx.globalAlpha = 0.7;
              ctx.beginPath();
              for (var f = 0; f < 120; f++) {
                var freq = (f / 120) * 60,
                  bIdx =
                    freq < 4
                      ? 0
                      : freq < 8
                        ? 1
                        : freq < 13
                          ? 2
                          : freq < 30
                            ? 3
                            : 4;
                var amp = Math.abs(
                  eeg(p.time + f * 0.002, el.id, bIdx, p.pid, p.fp),
                );
                var x = 40 + (freq / 60) * (specW - 50);
                var y = H - 30 - (amp / 80) * (H - 50);
                f === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
              }
              ctx.stroke();
              ctx.globalAlpha = 1;
            });
            // Electrode legend
            ctx.font = "bold 8px " + M;
            d.eeg.slice(0, 4).forEach(function (el, ei) {
              var bc = isDk ? BANDS[ei % 5].d : BANDS[ei % 5].c;
              ctx.fillStyle = bc;
              ctx.fillText(el.id, specW - 50, 25 + ei * 12);
            });
            // ── Right: Power band bars (all bands, animated) ──
            ctx.fillStyle = th.t2;
            ctx.font = "bold 9px " + M;
            ctx.fillText("Band Power", barX, 14);
            var bandH = (H - 30) / 5 - 4;
            BANDS.forEach(function (band, bi) {
              var bc = isDk ? band.d : band.c;
              // Average power across electrodes
              var sum = 0;
              d.eeg.forEach(function (el) {
                sum += bpow(p.time, el.id, bi, p.pid, p.fp);
              });
              var avg = sum / d.eeg.length;
              // Track history for sparkline
              if (!hist.current[bi]) hist.current[bi] = [];
              hist.current[bi].push(avg);
              if (hist.current[bi].length > 40) hist.current[bi].shift();
              var by = 22 + bi * (bandH + 4);
              // Label
              ctx.fillStyle = bc;
              ctx.font = "bold 8px " + M;
              ctx.fillText(band.n, barX, by + 10);
              // Bar background
              ctx.fillStyle = th.bd + "60";
              ctx.fillRect(barX + 45, by + 2, barW - 50, bandH - 4);
              // Bar fill
              ctx.fillStyle = bc;
              ctx.globalAlpha = 0.8;
              ctx.fillRect(barX + 45, by + 2, avg * (barW - 50), bandH - 4);
              ctx.globalAlpha = 1;
              // Percentage
              ctx.fillStyle = th.tx;
              ctx.font = "bold 8px " + M;
              ctx.fillText(
                Math.round(avg * 100) + "%",
                barX + 45 + avg * (barW - 50) + 4,
                by + bandH - 6,
              );
              // Mini sparkline
              ctx.strokeStyle = bc + "80";
              ctx.lineWidth = 1;
              ctx.beginPath();
              var sparkH = bandH - 8;
              hist.current[bi].forEach(function (v, i) {
                var sx = barX + 45 + (i / 39) * (barW - 50);
                var sy = by + bandH - 2 - v * sparkH;
                i === 0 ? ctx.moveTo(sx, sy) : ctx.lineTo(sx, sy);
              });
              ctx.stroke();
            });
          },
          [Math.floor(p.time * 5)],
        );
        return h("canvas", {
          ref: ref,
          width: 1100,
          height: 350,
          style: {
            width: "100%",
            height: 300,
            borderRadius: 8,
            background: th.sg,
          },
        });
      }

            height: 200,
            style: {

                  return b.toLowerCase();
                }),
                send_absolute: true,
                send_relative: true,
                send_averages: true,
              }),
            }).catch(function () {});
            return function () {
              fetch("/api/osc_config", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ enabled: false }),
              }).catch(function () {});
            };
          },
          [oscSending, oscPort, oscBands],
        );

        useEffect(
          function () {
            if (!isRec) return;
            var snap = {};
            if (recType === "eeg")
              d.eeg.forEach(function (e) {
                BANDS.forEach(function (b, i) {
                  snap[e.id + "_" + b.n] = bpow(
                    time,
                    e.id,
                    i,
                    recFilt ? pid : "none",
                    recFilt ? fp : {},
                  );
                });
              });
            else if (d.aux[recType])
              d.aux[recType].ch.forEach(function (c) {
                snap[c] = simAux(time, c);
              });
            setRecBuf(function (p) {
              return p.concat([{ t: time - (recT0 || time), v: snap }]);
            });
          },
          [isRec, Math.floor(time * 4)],
        );

        function toggleRec() {
          if (isRec) {

                  dur: (time - recT0).toFixed(1),
                  smp: recBuf.length,

        // ── OSC Live Monitor ──
        function OSCMonitor() {
          var usedPid = oscFilt ? pid : "none",
            usedFp = oscFilt ? fp : {};
          // Build live message list
          var msgs = [];
          // Muse protocol (Mode A)
          oscBands.forEach(function (bn) {
            var bIdx = BANDS.findIndex(function (b) {
              return b.n === bn;
            });
            if (bIdx < 0) return;
            var vals = d.eeg.map(function (el) {
              return bpowOSC(time, el.id, bIdx, usedPid, usedFp).toFixed(3);
            });
            msgs.push({
              addr: "/muse/elements/" + bn.toLowerCase() + "_absolute",
              tag: '"' + "f".repeat(d.ch) + '"',
              vals: vals.join("  "),
              mode: "A",
            });
          });
          oscExtras.forEach(function (ex) {
            if (ex.indexOf("_rel") > 0) {
              var bn = ex.replace("_rel", "");
              var bIdx = BANDS.findIndex(function (b) {
                return b.n === bn;
              });
              if (bIdx < 0) return;
              var vals = d.eeg.map(function (el) {
                var tot = 0;
                for (var i = 0; i < 5; i++)
                  tot += bpowAbs(time, el.id, i, usedPid, usedFp);
                return (
                  tot > 0
                    ? bpowAbs(time, el.id, bIdx, usedPid, usedFp) / tot
                    : 0
                ).toFixed(3);
              });
              msgs.push({
                addr: "/muse/elements/" + bn.toLowerCase() + "_relative",
                tag: '"' + "f".repeat(d.ch) + '"',
                vals: vals.join("  "),
                mode: "A",
              });
            }
            if (ex === "acc")
              msgs.push({
                addr: "/muse/acc",
                tag: '"fff"',
                vals: [
                  simAux(time, "AccX").toFixed(2),
                  simAux(time, "AccY").toFixed(2),
                  simAux(time, "AccZ").toFixed(2),
                ].join("  "),
                mode: "A",
              });
            if (ex === "gyro")
              msgs.push({
                addr: "/muse/gyro",
                tag: '"fff"',
                vals: [
                  simAux(time, "GyroX").toFixed(1),
                  simAux(time, "GyroY").toFixed(1),
                  simAux(time, "GyroZ").toFixed(1),
                ].join("  "),
                mode: "A",
              });
            if (ex === "ppg")
              msgs.push({
                addr: "/ppg/hr",
                tag: '"f"',
                vals: simAux(time, "PPG1").toFixed(1),
                mode: "B",
              });
            if (ex === "eeg") {
              var vals2 = d.eeg.map(function (el) {
                return eeg(time, el.id, 2, usedPid, usedFp).toFixed(1);
              });
              msgs.push({
                addr: "/muse/eeg",
                tag: '"' + "f".repeat(Math.max(d.ch, 4) + 2) + '"',
                vals: vals2.join("  ") + " 0.0 0.0",
                mode: "A",
              });
            }
          });
          // Mode B scalar messages
          oscBands.forEach(function (bn) {
            var bIdx = BANDS.findIndex(function (b) {
              return b.n === bn;
            });
            if (bIdx < 0) return;
            d.eeg.forEach(function (el) {
              msgs.push({
                addr: "/eeg/" + el.id + "/" + bn.toLowerCase(),
                tag: '"f"',
                vals: bpowOSC(time, el.id, bIdx, usedPid, usedFp).toFixed(3),
                mode: "B",
              });
            });
          });
          if (oscExtras.indexOf("quality") >= 0)
            d.eeg.forEach(function (el) {
              msgs.push({
                addr: "/eeg/" + el.id + "/quality",
                tag: '"f"',
                vals: qual(el.id, time).toFixed(2),
                mode: "B",
              });
            });
          if (oscExtras.indexOf("gate") >= 0)
            msgs.push({
              addr: "/eeg/gate",
              tag: '"f"',
              vals:
                bpow(time, d.eeg[0].id, bi, usedPid, usedFp) > 0.4
                  ? "1.0"
                  : "0.0",
              mode: "B",
            });
          if (oscExtras.indexOf("trigger") >= 0)
            msgs.push({
              addr: "/eeg/trigger",
              tag: '"f"',
              vals: Math.random() > 0.9 ? "1.0" : "0.0",
              mode: "B",
            });

          return h(
            "div",
            { style: { fontFamily: M, fontSize: 8, lineHeight: 1.6 } },
            // Header
            h(
              "div",
              {
                style: {
                  display: "flex",
                  justifyContent: "space-between",
                  alignItems: "center",
                  marginBottom: 6,
                },
              },
              h(
                "div",
                { style: { display: "flex", alignItems: "center", gap: 6 } },

                  style: {

                    background: th.gd,
                    animation: "pulse 1s infinite",
                  },
                }),

                  "span",
                  { style: { fontSize: 9, fontWeight: 700, color: th.gd } },
                  "LIVE",
                ),
                h(
                  "span",
                  { style: { fontSize: 8, color: th.t3 } },
                  msgs.length +
                    " messages @ " +
                    oscRate +
                    " Hz \u2192 :" +
                    oscPort,
                ),

              h(
                "div",
                { style: { display: "flex", gap: 4 } },
                h(
                  "span",
                  {
                    style: {
                      fontSize: 7,
                      padding: "1px 5px",
                      borderRadius: 4,
                      background: th.ac + "20",
                      color: th.ac,
                    },
                  },
                  "A=Muse",
                ),
                h(
                  "span",

                      padding: "1px 5px",

                      background: th.wr + "20",
                      color: th.wr,

                h(

            // Messages
            h(

              {

                  background: th.sg,
                  borderRadius: 6,
                  border: "1px solid " + th.bd,
                  padding: 6,
                },

              msgs.map(function (m, i) {
                var modeCol = m.mode === "A" ? th.ac : th.wr;
                return h(

                  h(

              }),

        }

                            }),
                            op.extras.map(function (ex) {
                              return h(
                                "span",
                                {
                                  key: ex,
                                  style: {
                                    fontSize: 7,
                                    padding: "1px 5px",
                                    borderRadius: 10,
                                    background: th.wr + "15",
                                    color: th.wr,
                                  },
                                },
                                ex.toUpperCase(),
                              );
                            }),
                          ),
                          h(
                            "div",
                            { style: { fontSize: 8, color: th.t3 } },
                            op.desc,
                          ),
                        );
                      }),
                    ),
                    // Save new OSC preset
                    h(
                      "button",
                      {
                        onClick: function () {
                          var n = prompt("OSC Preset name:");
                          if (!n) return;
                          var tgt =
                            prompt(
                              "Target app (Csound, Max/MSP, TouchDesigner, Unity, Ableton, Logic, Other):",
                            ) || "Other";
                          setOscPresets(function (p) {
                            return p.concat([
                              {
                                n: n,
                                target: tgt,
                                bands: oscBands.slice(),
                                extras: oscExtras.slice(),
                                rate: oscRate,
                                smooth: oscSmooth,
                                filt: oscFilt,
                                desc:
                                  "Custom \u2014 " +
                                  oscBands.length +
                                  " bands" +
                                  (oscExtras.length > 0
                                    ? " + " + oscExtras.join(",")
                                    : "") +
                                  " at " +
                                  oscRate +
                                  "Hz",
                              },
                            ]);
                          });
                        },
                        style: {
                          padding: "5px 14px",
                          borderRadius: 6,
                          border: "1px solid " + th.ac,
                          background: th.ac + "15",
                          color: th.ac,
                          fontSize: 10,
                          fontWeight: 700,
                          marginBottom: 8,
                        },
                      },
                      "+Save Current OSC Config as Preset",
                    ),
                    oscPresets.length > 6 &&
                      h(
                        "button",
                        {
                          onClick: function () {
                            if (confirm("Delete last custom OSC preset?"))
                              setOscPresets(function (p) {
                                return p.slice(0, p.length - 1);
                              });
                          },
                          style: {
                            padding: "4px 12px",
                            borderRadius: 6,
                            border: "1px solid " + th.rd,
                            background: th.rd + "10",
                            color: th.rd,
                            fontSize: 10,
                            fontWeight: 600,
                            marginLeft: 8,
                          },
                        },
                        "\u2715 Delete Last",
                      ),

                    // Current OSC state summary
                    h(
                      "div",
                      {
                        style: {
                          marginTop: 10,
                          padding: "8px 10px",
                          borderRadius: 8,
                          background: th.sg,
                          border: "1px solid " + th.bd,
                        },
                      },
                      h(
                        "div",
                        {
                          style: {
                            fontSize: 9,
                            fontWeight: 700,
                            color: th.t2,
                            marginBottom: 4,
                          },
                        },
                        "Current OSC State",
                      ),
                      h(
                        "div",
                        {
                          style: {
                            fontSize: 8,
                            color: th.t3,
                            lineHeight: 1.7,
                            fontFamily: M,
                          },
                        },
                        "Bands: " + oscBands.join(", "),
                        h("br"),
                        "Extras: " +
                          (oscExtras.length > 0
                            ? oscExtras.join(", ")
                            : "none"),
                        h("br"),
                        "Rate: " +
                          oscRate +
                          " Hz | Smooth: " +
                          oscSmooth.toFixed(2),
                        h("br"),
                        "Filter: " +
                          (oscFilt
                            ? (
                                PROCS.find(function (p) {
                                  return p.id === pid;
                                }) || {}
                              ).n
                            : "OFF (raw)"),
                        h("br"),
                        "Port: " +
                          oscPort +
                          " | Messages/tick: ~" +
                          (oscBands.length + oscExtras.length),
                      ),
                    ),
                  ),
                ),

                // ── Aux Toggles ──
                h(
                  Card,
                  { t: th, title: "Aux Sensor Toggles" },
                  h(
                    "div",
                    null,
                    Object.keys(d.aux).length === 0
                      ? h(
                          "div",
                          { style: { fontSize: 10, color: th.t3, padding: 8 } },
                          "No aux sensors on " + d.name,
                        )
                      : Object.keys(d.aux).map(function (k) {
                          return h(
                            "div",
                            {
                              key: k,
                              style: {
                                display: "flex",
                                alignItems: "center",
                                justifyContent: "space-between",
                                padding: "6px 10px",
                                borderRadius: 6,
                                background: th.sg,
                                border: "1px solid " + th.bd,
                                marginBottom: 3,
                              },
                            },
                            h(
                              "div",
                              null,
                              h(
                                "span",
                                {
                                  style: {
                                    fontSize: 10,
                                    fontWeight: 700,
                                    textTransform: "uppercase",
                                    color: auxOn[k] !== false ? th.tx : th.t3,
                                  },
                                },
                                k,
                              ),
                              h(
                                "span",
                                {
                                  style: {
                                    fontSize: 8,
                                    color: th.t3,
                                    marginLeft: 6,
                                  },
                                },
                                d.aux[k].d,
                              ),
                            ),
                            h(
                              "button",
                              {
                                onClick: function () {
                                  setAuxOn(function (p) {
                                    var n = {};
                                    for (var x in p) n[x] = p[x];
                                    n[k] = p[k] === false;
                                    return n;
                                  });
                                },
                                style: {
                                  width: 30,
                                  height: 16,
                                  borderRadius: 8,
                                  border: "none",
                                  background:
                                    auxOn[k] !== false ? th.gd : th.bd,
                                  position: "relative",
                                },
                              },
                              h("div", {
                                style: {
                                  width: 12,
                                  height: 12,
                                  borderRadius: 6,
                                  background: "#fff",
                                  position: "absolute",
                                  top: 2,
                                  left: auxOn[k] !== false ? 16 : 2,
                                  transition: "left .2s",
                                },
                              }),
                            ),
                          );
                        }),
                  ),
                ),
              ),

            view === "recs" &&
              h(
                Card,
                { t: th, title: "Recordings (" + recs.length + ")" },
                recs.length === 0
                  ? h(
                      "div",
                      {
                        style: {
                          textAlign: "center",
                          padding: 24,
                          color: th.t3,
                          fontSize: 11,
                        },
                      },
                      "No recordings yet \u2014 press Rec",
                    )
                  : recs.map(function (r) {
                      return h(
                        "div",
                        {
                          key: r.id,
                          style: {
                            padding: "8px 10px",
                            borderRadius: 7,
                            background: th.sg,
                            border: "1px solid " + th.bd,
                            marginBottom: 4,
                          },
                        },
                        h(
                          "div",
                          {
                            style: {
                              display: "flex",
                              justifyContent: "space-between",
                              alignItems: "center",
                            },
                          },
                          h(
                            "div",
                            {
                              style: {
                                display: "flex",
                                alignItems: "center",
                                gap: 5,
                              },
                            },
                            h(
                              "span",
                              { style: { fontSize: 11, fontWeight: 700 } },
                              r.ts,
                            ),
                            h(
                              "span",
                              {
                                style: {
                                  fontSize: 7,
                                  fontWeight: 700,
                                  padding: "1px 5px",
                                  borderRadius: 4,
                                  background: th.ac + "20",
                                  color: th.ac,
                                  textTransform: "uppercase",
                                },
                              },
                              r.type,
                            ),
                            h(
                              "span",
                              {
                                style: {
                                  fontSize: 7,
                                  padding: "1px 5px",
                                  borderRadius: 4,
                                  background: r.filt
                                    ? th.gd + "20"
                                    : th.bd + "40",
                                  color: r.filt ? th.gd : th.t3,
                                },
                              },
                              r.filt ? r.pn : "RAW",
                            ),
                          ),
                          h(
                            "div",
                            { style: { display: "flex", gap: 3 } },
                            h(
                              "button",
                              {
                                onClick: function () {
                                  var csv =
                                    "# Type:" +
                                    r.type +
                                    " Filter:" +
                                    (r.filt ? r.pn : "Raw") +
                                    "\nTime," +
                                    r.chs.join(",") +
                                    "\n";
                                  r.data.forEach(function (row) {
                                    var l = row.t.toFixed(3);
                                    r.chs.forEach(function (c) {
                                      l +=
                                        "," + (row.v[c] || 0).toFixed
                                          ? row.v[c].toFixed(4)
                                          : "0";
                                    });
                                    csv += l + "\n";
                                  });
                                  var a = document.createElement("a");
                                  a.href = URL.createObjectURL(
                                    new Blob([csv], { type: "text/csv" }),
                                  );
                                  a.download =
                                    "neurovis_" + r.type + "_" + r.id + ".csv";
                                  a.click();
                                },
                                style: {
                                  padding: "2px 6px",
                                  borderRadius: 4,
                                  border: "1px solid " + th.bd,
                                  background: "transparent",
                                  color: th.ac,
                                  fontSize: 8,
                                  fontWeight: 700,
                                },
                              },
                              "CSV",
                            ),
                            h(
                              "button",
                              {
                                onClick: function () {
                                  setRecs(function (p) {
                                    return p.filter(function (x) {
                                      return x.id !== r.id;
                                    });
                                  });
                                },
                                style: {
                                  padding: "2px 6px",
                                  borderRadius: 4,
                                  border: "1px solid rgba(239,68,68,.3)",
                                  background: "transparent",
                                  color: "#ef4444",
                                  fontSize: 8,
                                },
                              },
                              "\u2715",
                            ),
                          ),
                        ),
                        h(
                          "div",
                          {
                            style: { fontSize: 8, color: th.t3, marginTop: 3 },
                          },
                          r.dur +
                            "s \u00B7 " +
                            r.smp +
                            " samples \u00B7 " +
                            r.chs.length +
                            " channels",
                        ),
                      );
                    }),
              ),
          ),
        );
      }

      ReactDOM.render(h(App), document.getElementById("root"));
    </script>
    <script src="app.js?v=6"></script>
  </body>
</html>
